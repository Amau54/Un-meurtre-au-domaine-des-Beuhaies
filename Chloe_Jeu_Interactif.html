<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Meurtre au Domaine des Beuhaies — Chloé enquête</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Italianno&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&display=swap');

:root{
  --cream:#faf4ea;
  --cream-2:#f3e9d5;
  --paper:#fffaf2;
  --ink:#3a2a1c;
  --brown:#5d4037;
  --brown-2:#6d4c41;
  --brown-3:#795548;
  --brown-soft:#8d6e63;
  --gold:#b8860b;
  --gold-light:#d4af37;
  --rose:#c4878c;
  --rose-light:#e8c5c5;
  --moss:#7a8471;
  --danger:#a64237;
  --shadow:rgba(80,40,20,.15);
  --sidebar-w:280px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--cream);color:var(--ink);font-family:'Cormorant Garamond',serif;font-size:16px;line-height:1.5;height:100%}
body{overflow:hidden;background:
  radial-gradient(circle at 0% 0%,rgba(180,140,90,.08),transparent 40%),
  radial-gradient(circle at 100% 100%,rgba(180,140,90,.08),transparent 40%),
  var(--cream);}
button{font-family:inherit;font-size:inherit;cursor:pointer;border:none;background:none;color:inherit}
a{color:var(--brown-2)}

/* ====== TOP BAR ====== */
.topbar{
  position:fixed;top:0;left:0;right:0;height:64px;
  background:linear-gradient(180deg,var(--paper),var(--cream-2));
  border-bottom:1px solid rgba(120,80,50,.25);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 18px;z-index:60;
  box-shadow:0 2px 8px var(--shadow);
}
.topbar h1{
  font-family:'Playfair Display',serif;font-style:italic;font-weight:600;
  font-size:22px;margin:0;color:var(--brown);letter-spacing:.5px;
}
.topbar h1::before,.topbar h1::after{content:"❦";color:var(--gold);margin:0 12px;font-size:14px;vertical-align:middle}
.topbar .act-indicator{
  font-size:12px;text-transform:uppercase;letter-spacing:2px;
  color:var(--rose);font-weight:500;
}
.topbar .clock{
  font-family:'Italianno',cursive;font-size:30px;color:var(--brown);
  display:flex;align-items:center;gap:8px;
}
.topbar .clock::before{content:"⏱";font-size:18px;color:var(--gold)}

/* ====== LAYOUT ====== */
.app{
  display:flex;height:100vh;padding-top:64px;
}

/* ====== SIDEBAR (CHARACTERS) ====== */
.sidebar{
  width:var(--sidebar-w);
  background:linear-gradient(180deg,var(--paper),var(--cream-2));
  border-right:1px solid rgba(120,80,50,.2);
  overflow-y:auto;
  box-shadow:2px 0 12px var(--shadow);
  flex-shrink:0;
}
.sidebar h3{
  font-family:'Playfair Display',serif;font-style:italic;font-weight:600;
  text-align:center;color:var(--brown);
  padding:14px 12px 6px;margin:0;font-size:18px;
  border-bottom:1px solid rgba(120,80,50,.15);
}
.sidebar h3::before{content:"❧ ";color:var(--gold)}
.sidebar h3::after{content:" ❧";color:var(--gold)}
.sidebar .group-title{
  font-size:11px;text-transform:uppercase;letter-spacing:1.5px;
  color:var(--brown-soft);padding:14px 16px 6px;font-weight:500;
}
.char-row{
  display:flex;align-items:center;gap:10px;
  padding:8px 12px;cursor:pointer;
  border-bottom:1px solid rgba(120,80,50,.06);
  transition:background .15s,padding-left .15s;
  position:relative;
}
.char-row:hover{background:var(--cream);padding-left:18px}
.char-row.active{background:var(--cream-2);border-left:3px solid var(--gold)}
.char-row .portrait{
  width:42px;height:42px;border-radius:50%;
  background:var(--cream-2);
  display:flex;align-items:center;justify-content:center;
  font-size:22px;border:2px solid var(--brown-soft);flex-shrink:0;
}
.char-row .portrait.suspect{border-color:var(--danger)}
.char-row .portrait.bavard{border-color:var(--moss)}
.char-row .portrait.discret{border-color:var(--brown-3)}
.char-row .portrait.host{border-color:var(--gold)}
.char-row .info{flex:1;min-width:0}
.char-row .info .name{font-weight:600;color:var(--brown);font-size:14px;line-height:1.2;font-family:'Playfair Display',serif}
.char-row .info .sub{font-size:11px;color:var(--brown-soft);text-transform:uppercase;letter-spacing:.8px;margin-top:2px}
.char-row .sub.suspect{color:var(--danger)}
.char-row .sub.bavard{color:var(--moss)}
.char-row .sub.discret{color:var(--brown-3)}
.char-row .sub.host{color:var(--gold)}
.char-row .badge-new{
  position:absolute;right:10px;top:50%;transform:translateY(-50%);
  width:8px;height:8px;background:var(--rose);border-radius:50%;
}

/* ====== STAGE (MAIN AREA) ====== */
.stage{
  flex:1;overflow-y:auto;padding:24px 32px 80px;
  background:
    radial-gradient(circle at 50% 0%,rgba(212,175,55,.06),transparent 50%);
}
.location-tabs{
  display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px;
  padding-bottom:14px;border-bottom:1px solid rgba(120,80,50,.15);
}
.loc-btn{
  background:transparent;border:1px solid transparent;border-radius:20px;
  padding:6px 14px;font-size:14px;color:var(--brown-2);
  transition:all .15s;font-family:'Cormorant Garamond',serif;
}
.loc-btn:hover{background:var(--cream-2)}
.loc-btn.active{background:var(--brown);color:var(--paper);border-color:var(--gold)}
.loc-btn.locked{opacity:.4;cursor:not-allowed}
.loc-btn.locked::before{content:"🔒 ";font-size:11px}
.loc-btn .icon{margin-right:4px}

.scene{
  background:var(--paper);border:1px solid rgba(120,80,50,.2);
  border-radius:14px;padding:30px;
  box-shadow:0 4px 20px var(--shadow);
  position:relative;overflow:hidden;
}
.scene::before{
  content:"";position:absolute;top:0;left:0;right:0;height:4px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
}
.scene h2{
  font-family:'Playfair Display',serif;font-weight:600;font-style:italic;
  margin:0 0 4px;font-size:30px;color:var(--brown);text-align:center;
}
.scene h2 .icon{font-size:28px;margin-right:8px;font-style:normal}
.scene .scene-sub{
  text-align:center;color:var(--brown-soft);font-style:italic;
  margin-bottom:14px;font-size:14px;letter-spacing:.5px;
}
.scene .scene-desc{
  font-size:17px;color:var(--ink);line-height:1.7;
  padding:14px 0;border-top:1px solid rgba(120,80,50,.1);
  border-bottom:1px solid rgba(120,80,50,.1);
  font-style:italic;color:var(--brown-2);
  text-align:center;max-width:680px;margin:0 auto 14px;
}

.interest-points{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:14px;margin-top:18px;
}
.point{
  background:linear-gradient(135deg,var(--cream),var(--paper));
  border:1px solid rgba(120,80,50,.2);
  border-radius:10px;
  padding:14px;cursor:pointer;
  transition:all .15s;
  position:relative;text-align:center;
}
.point:hover{transform:translateY(-2px);box-shadow:0 4px 14px var(--shadow);border-color:var(--gold)}
.point .icon{font-size:36px;display:block;margin-bottom:6px;line-height:1}
.point .label{font-family:'Playfair Display',serif;font-weight:600;color:var(--brown);font-size:15px;line-height:1.2}
.point .hint{font-size:12px;color:var(--brown-soft);font-style:italic;margin-top:2px}
.point.found{background:linear-gradient(135deg,rgba(212,175,55,.08),var(--paper));border-color:var(--gold-light)}
.point.found .label::after{content:" ✓";color:var(--moss)}
.point.locked{opacity:.5;cursor:not-allowed}
.point.locked::before{
  content:"🔒";position:absolute;top:8px;right:10px;font-size:14px;
}
.point.new::after{
  content:"✦";position:absolute;top:6px;left:8px;color:var(--rose);font-size:14px;
  animation:pulse 2s infinite;
}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}

.scene-empty{
  text-align:center;color:var(--brown-soft);font-style:italic;padding:30px;font-size:15px;
}

/* ====== DIALOGUE MODAL ====== */
.dlg-back{
  position:fixed;inset:0;background:rgba(30,18,10,.7);
  z-index:200;display:none;align-items:center;justify-content:center;padding:20px;
  backdrop-filter:blur(2px);
}
.dlg-back.show{display:flex}
.dlg{
  background:var(--paper);max-width:780px;width:100%;
  max-height:90vh;border-radius:14px;
  border:2px solid var(--gold);
  box-shadow:0 30px 80px rgba(0,0,0,.5);
  display:flex;flex-direction:column;animation:dlgIn .25s ease;
}
@keyframes dlgIn{from{opacity:0;transform:scale(.95) translateY(10px)}to{opacity:1;transform:none}}
.dlg-head{
  padding:18px 28px 14px;
  background:linear-gradient(180deg,var(--cream-2),var(--paper));
  border-radius:12px 12px 0 0;
  display:flex;align-items:center;gap:14px;
  border-bottom:1px solid rgba(120,80,50,.15);
}
.dlg-head .portrait{
  width:60px;height:60px;border-radius:50%;
  background:var(--cream);display:flex;align-items:center;justify-content:center;
  font-size:30px;border:2px solid var(--brown-soft);flex-shrink:0;
}
.dlg-head .portrait.suspect{border-color:var(--danger)}
.dlg-head .portrait.bavard{border-color:var(--moss)}
.dlg-head .portrait.discret{border-color:var(--brown-3)}
.dlg-head .info{flex:1;min-width:0}
.dlg-head h2{font-family:'Playfair Display',serif;margin:0;font-size:22px;color:var(--brown);font-weight:600}
.dlg-head .role{font-style:italic;color:var(--brown-soft);font-size:14px;margin-top:2px}
.dlg-close{
  background:transparent;border:none;font-size:26px;color:var(--brown-soft);
  cursor:pointer;line-height:1;padding:4px 12px;border-radius:50%;
}
.dlg-close:hover{background:var(--cream-2);color:var(--brown)}
.dlg-body{padding:18px 28px;overflow-y:auto;flex:1}
.dlg-body p{margin:.4em 0}

.quote{
  font-style:italic;color:var(--brown);
  border-left:3px solid var(--gold);
  padding:12px 18px;margin:14px 0;
  background:rgba(212,175,55,.06);
  border-radius:0 6px 6px 0;line-height:1.7;
}
.narration{
  font-style:italic;color:var(--brown-soft);font-size:14px;
  text-align:center;margin:10px 0;letter-spacing:.5px;
}
.questions{margin-top:14px}
.questions h4{
  margin:18px 0 8px;font-family:'Playfair Display',serif;
  color:var(--brown);font-weight:600;font-size:13px;
  text-transform:uppercase;letter-spacing:1.5px;
}
.questions h4::before{content:"❧ ";color:var(--gold)}
.q-btn{
  display:block;width:100%;text-align:left;
  background:var(--cream);border:1px solid rgba(120,80,50,.2);
  color:var(--brown);padding:10px 14px;margin:6px 0;
  border-radius:8px;font-size:15px;
  transition:all .15s;font-family:inherit;cursor:pointer;
}
.q-btn:hover:not(:disabled){background:var(--cream-2);border-color:var(--gold);transform:translateX(3px)}
.q-btn.confront{
  background:linear-gradient(135deg,rgba(196,135,140,.15),rgba(212,175,55,.08));
  border-color:var(--rose);font-weight:500;
}
.q-btn.confront::before{content:"⚔ ";color:var(--rose)}
.q-btn:disabled{opacity:.4;cursor:not-allowed;background:#f0e8d8}
.q-btn.answered{background:#ede4d0;color:var(--brown-soft);font-style:italic}
.q-btn.answered::before{content:"✓ ";color:var(--moss)}
.q-btn.answered.confront::before{content:"✓⚔ "}

.text-card{
  background:#fdf6e3;border:1px solid #d4a76b;border-radius:6px;
  padding:14px 18px;margin:12px 0;
  font-family:'Cormorant Garamond',serif;font-style:italic;
  color:#4a3220;line-height:1.7;
  box-shadow:inset 0 0 20px rgba(180,130,80,.1);
  position:relative;white-space:pre-wrap;
}
.text-card::before{
  content:"";position:absolute;top:6px;left:6px;right:6px;bottom:6px;
  border:1px dashed rgba(150,100,60,.3);pointer-events:none;border-radius:4px;
}
.text-card.burnt{background:linear-gradient(135deg,#fdf6e3 30%,#3a2a1c)}

.code-box{
  text-align:center;margin:18px 0;padding:18px;
  background:var(--cream);border-radius:8px;
  border:1px solid var(--gold-light);
}
.code-box input{
  font-family:'Playfair Display',serif;font-size:32px;text-align:center;
  width:160px;letter-spacing:8px;
  border:2px solid var(--brown-soft);border-radius:6px;
  padding:6px 10px;background:var(--paper);color:var(--brown);
}
.code-box button{
  background:var(--brown);color:var(--paper);border:1px solid var(--gold);
  padding:10px 22px;border-radius:6px;font-size:15px;margin-left:12px;
  font-family:inherit;
}
.code-box button:hover{background:var(--brown-3)}
.code-box .hint{font-size:13px;color:var(--brown-soft);margin-top:8px;font-style:italic}
.failure{color:var(--danger);font-style:italic;margin:8px 0;text-align:center;font-weight:500}

.success-card{
  background:linear-gradient(135deg,rgba(212,175,55,.18),rgba(180,140,90,.06));
  border:2px solid var(--gold);padding:20px;border-radius:10px;
  margin:14px 0;text-align:center;
}
.success-card h3{
  margin:0 0 10px;color:var(--brown);font-family:'Playfair Display',serif;
  font-style:italic;font-size:22px;
}

/* ====== FLOATING ACTIONS ====== */
.floating-actions{
  position:fixed;bottom:18px;right:18px;
  display:flex;flex-direction:column;gap:10px;z-index:80;
}
.float-btn{
  width:54px;height:54px;border-radius:50%;
  background:var(--brown);color:var(--gold-light);
  border:2px solid var(--gold);font-size:22px;cursor:pointer;
  box-shadow:0 4px 14px rgba(0,0,0,.3);
  transition:transform .15s,background .15s;
  position:relative;
}
.float-btn:hover{transform:scale(1.08);background:var(--brown-3)}
.float-btn .count{
  position:absolute;top:-4px;right:-4px;
  background:var(--rose);color:#fff;font-size:11px;font-weight:600;
  border-radius:50%;width:22px;height:22px;
  display:flex;align-items:center;justify-content:center;
  border:2px solid var(--paper);font-family:'Cormorant Garamond',serif;
}

/* ====== PANELS ====== */
.panel-back{
  position:fixed;inset:0;background:rgba(30,18,10,.5);
  z-index:150;display:none;
  backdrop-filter:blur(2px);
}
.panel-back.show{display:block;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.panel{
  position:fixed;top:0;right:0;bottom:0;width:420px;max-width:100vw;
  background:linear-gradient(180deg,var(--paper),var(--cream-2));
  border-left:2px solid var(--gold);box-shadow:-8px 0 24px rgba(0,0,0,.3);
  transform:translateX(100%);transition:transform .25s ease;
  z-index:160;overflow-y:auto;
  padding:20px 24px;
}
.panel.show{transform:none}
.panel h2{
  font-family:'Playfair Display',serif;font-style:italic;font-weight:600;
  font-size:24px;color:var(--brown);margin:0 0 6px;text-align:center;
}
.panel h2::before{content:"❦ ";color:var(--gold)}
.panel h2::after{content:" ❦";color:var(--gold)}
.panel .close-x{
  position:absolute;top:14px;left:14px;
  background:transparent;border:none;font-size:24px;color:var(--brown-soft);cursor:pointer;
  padding:4px 10px;border-radius:50%;
}
.panel .close-x:hover{background:var(--cream-2);color:var(--brown)}

.notebook-entry{
  background:var(--paper);border-left:3px solid var(--gold);
  padding:10px 14px;margin:8px 0;border-radius:0 6px 6px 0;font-size:14px;
}
.notebook-entry .meta{
  font-size:11px;color:var(--brown-soft);text-transform:uppercase;
  letter-spacing:1px;margin-bottom:3px;
}
.notebook-entry .body{color:var(--ink);line-height:1.5}

.inventory-grid{
  display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:14px;
}
.inv-item{
  background:var(--paper);border:1px solid var(--gold-light);
  border-radius:8px;padding:10px;text-align:center;cursor:pointer;
  transition:transform .15s;
}
.inv-item:hover{transform:translateY(-2px)}
.inv-item .icon{font-size:28px;display:block;margin-bottom:4px}
.inv-item .name{font-size:12px;color:var(--brown);font-weight:600;line-height:1.2}

.mj-section{margin-top:18px;padding:14px;background:var(--brown);color:var(--paper);border-radius:10px}
.mj-section h3{margin:0 0 8px;color:var(--gold-light);font-family:'Playfair Display',serif;font-size:16px}
.mj-section h3::before{content:""}.mj-section h3::after{content:""}
.mj-btn{
  display:block;width:100%;background:var(--paper);color:var(--brown);
  border:1px solid var(--gold);padding:8px 14px;border-radius:6px;
  font-size:14px;margin:6px 0;font-family:inherit;cursor:pointer;
}
.mj-btn:hover{background:var(--gold);color:#fff}
.mj-btn:disabled{opacity:.4;cursor:not-allowed}
.mj-hint{font-size:12px;color:rgba(255,255,255,.7);line-height:1.5;margin-top:6px;font-style:italic}

/* ====== MOBILE ====== */
@media (max-width:900px){
  :root{--sidebar-w:200px}
  .topbar h1{font-size:16px}
  .topbar h1::before,.topbar h1::after{display:none}
  .stage{padding:16px}
  .scene{padding:18px}
  .scene h2{font-size:22px}
  .char-row .info .sub{display:none}
  .panel{width:100vw}
}
@media (max-width:640px){
  :root{--sidebar-w:0}
  .sidebar{position:fixed;top:64px;left:-280px;bottom:0;width:280px;transition:left .25s;z-index:70}
  .sidebar.show{left:0;width:280px}
  .stage{padding:16px}
}
</style>
</head>
<body>

<!-- ===== TOP BAR ===== -->
<div class="topbar">
  <h1>Domaine des Beuhaies</h1>
  <div class="act-indicator" id="act-label">Acte I — Vous arrivez</div>
  <div class="clock" id="time-label">18h00</div>
</div>

<!-- ===== APP ===== -->
<div class="app">

  <!-- ===== SIDEBAR: CHARACTERS ===== -->
  <aside class="sidebar" id="sidebar">
    <h3>Les Convives</h3>
    <div id="sidebar-list"></div>
  </aside>

  <!-- ===== STAGE ===== -->
  <main class="stage">
    <div class="location-tabs" id="loc-tabs"></div>
    <div id="scene-content"></div>
  </main>

</div>

<!-- ===== FLOATING ACTIONS ===== -->
<div class="floating-actions">
  <button class="float-btn" id="btn-inventory" title="Mes objets">🎒<span class="count" id="cnt-inv">0</span></button>
  <button class="float-btn" id="btn-notebook" title="Mon carnet">📓<span class="count" id="cnt-note">0</span></button>
  <button class="float-btn" id="btn-mj" title="Sir Amaury (MJ)" style="background:var(--gold);color:#fff">⚜</button>
</div>

<!-- ===== DIALOG MODAL ===== -->
<div class="dlg-back" id="dlg-back" onclick="if(event.target===this)closeDlg()">
  <div class="dlg" role="dialog">
    <div class="dlg-head">
      <div class="portrait" id="dlg-portrait"></div>
      <div class="info">
        <h2 id="dlg-title">…</h2>
        <div class="role" id="dlg-role"></div>
      </div>
      <button class="dlg-close" onclick="closeDlg()">×</button>
    </div>
    <div class="dlg-body" id="dlg-body"></div>
  </div>
</div>

<!-- ===== SIDE PANEL ===== -->
<div class="panel-back" id="panel-back" onclick="closePanel()"></div>
<div class="panel" id="panel">
  <button class="close-x" onclick="closePanel()">×</button>
  <div id="panel-content"></div>
</div>

<script>
/* ============================================================
   DATA
   ============================================================ */
const ACTS = [
  {n:1,name:"Acte I — Vous arrivez",locations:["jardin","potager"],time:"18h00"},
  {n:2,name:"Acte II — Au salon",locations:["bar","salon"],time:"18h15"},
  {n:3,name:"Acte III — Dans la maison",locations:["couloir","chambres","placard"],time:"18h30"},
  {n:4,name:"Acte IV — La dépendance",locations:["dependance"],time:"18h45"}
];

const LOCATIONS = {
  jardin:{name:"Le jardin",icon:"🌳",fromAct:1,
    desc:"L'air sent l'herbe coupée et la cire d'abeille. Une légère brise traverse les rosiers. Vous voyez le banc à l'ombre du tilleul, le barbecue éteint, et cette malle de rotin que Léa aimait tant.",
    objects:["banc","barbecue","malle_rotin"]},
  potager:{name:"Le potager",icon:"🌿",fromAct:1,
    desc:"Rangées de tomates, basilic, framboisiers. L'allée s'enfonce vers un coin discret derrière la haie — l'endroit où Marie et Léa se retrouvaient.",
    objects:["potager_trace"]},
  bar:{name:"Le bar",icon:"🍷",fromAct:2,

/* ============================================================
   STATE
   ============================================================ */
const State = {
  currentAct:1,
  currentLocation:"jardin",
  foundObjects:new Set(),
  inventory:new Set(),
  revealedFacts:new Set(),
  answeredQuestions:new Set(),
  charactersTalked:new Set(),
  notebook:[],
  resolved:false,
  notebookCounter:0
};

/* ============================================================
   UTILS
   ============================================================ */
function $(s,r=document){return r.querySelector(s)}
function $$(s,r=document){return [...r.querySelectorAll(s)]}
function noteToBook(meta,body){
  State.notebookCounter++;
  State.notebook.unshift({n:State.notebookCounter,meta,body,act:State.currentAct});
}
function stripHTML(html){const d=document.createElement('div');d.innerHTML=html;return d.textContent||""}

function isLocOpen(id){return LOCATIONS[id].fromAct<=State.currentAct}
function isObjAvailable(id){
  const o=OBJECTS[id];if(!o)return false;
  if(State.foundObjects.has(id))return true;
  if(o.fromAct && State.currentAct<o.fromAct)return false;
  return true;
}
function isQAvailable(charId,q){
  if(q.act && State.currentAct<q.act)return false;
  if(q.requires && !q.requires.every(r=>State.inventory.has(r)||State.foundObjects.has(r)))return false;
  if(q.requires_response && !q.requires_response.every(r=>State.revealedFacts.has(r)))return false;
  return true;
}
function hasNewQuestion(charId){
  const c=CHARACTERS[charId];
  return c.questions.some(q=>isQAvailable(c,q) && !State.answeredQuestions.has(charId+"."+q.id) && !q.isPresentation);
}

/* ============================================================
   FIND OBJECT
   ============================================================ */
function findObject(objId){
  const wasNew=!State.foundObjects.has(objId);
  if(wasNew){
    State.foundObjects.add(objId);
    if(OBJECTS[objId]){
      State.inventory.add(objId);
      const o=OBJECTS[objId];
      let snippet=o.desc||"";
      if(o.text)snippet="« "+o.text.replace(/\n/g," / ").slice(0,200)+"… »";
      noteToBook("Trouvé : "+o.name,snippet);
      if(o.revealsOnView)o.revealsOnView.forEach(r=>State.revealedFacts.add(r));
    }
  }
  return wasNew;
}

/* ============================================================
   RENDER SIDEBAR
   ============================================================ */
function renderSidebar(){
  const list=$("#sidebar-list");
  const chars=Object.entries(CHARACTERS).sort((a,b)=>a[1].order-b[1].order);
  let html=`<div class="group-title">Sir Amaury</div>`;
  chars.filter(([,c])=>c.statut==="host").forEach(([id,c])=>{
    html+=charRow(id,c);
  });
  html+=`<div class="group-title">Suspects</div>`;
  chars.filter(([,c])=>c.statut==="suspect").forEach(([id,c])=>{
    html+=charRow(id,c);
  });
  html+=`<div class="group-title">Témoins</div>`;
  chars.filter(([,c])=>["bavard","discret"].includes(c.statut)).forEach(([id,c])=>{
    html+=charRow(id,c);
  });
  list.innerHTML=html;
}
function charRow(id,c){
  const hasNew=hasNewQuestion(id) && State.currentAct>=1;
  const statusLabel={suspect:"Suspect",bavard:"Bavard",discret:"Discret",host:"Votre mari"}[c.statut]||"";
  return `<div class="char-row" onclick="talkTo('${id}')">
    <div class="portrait ${c.statut}">${c.icon}</div>
    <div class="info"><div class="name">${c.nickname}</div><div class="sub ${c.statut}">${statusLabel}</div></div>
    ${hasNew?'<span class="badge-new"></span>':''}
  </div>`;
}

/* ============================================================
   RENDER STAGE
   ============================================================ */
function renderLocTabs(){
  const tabs=$("#loc-tabs");
  const groups={
    "Extérieurs":["jardin","potager"],
    "Salon & bar":["bar","salon"],
    "La maison":["couloir","chambres","placard"],
    "Dépendance":["dependance"]
  };
  let html="";
  for(const[group,locs]of Object.entries(groups)){
    const visibleLocs=locs.filter(l=>LOCATIONS[l].fromAct<=4);
    if(visibleLocs.length===0)continue;
    visibleLocs.forEach(l=>{
      const loc=LOCATIONS[l];
      const open=isLocOpen(l);
      const active=State.currentLocation===l;
      const cls="loc-btn"+(active?" active":"")+(open?"":" locked");
      const click=open?`onclick="setLocation('${l}')"`:"";
      html+=`<button class="${cls}" ${click}><span class="icon">${loc.icon}</span>${loc.name}</button>`;
    });
  }
  tabs.innerHTML=html;
}
function renderScene(){
  const loc=LOCATIONS[State.currentLocation];
  if(!loc || !isLocOpen(State.currentLocation)){
    $("#scene-content").innerHTML=`<div class="scene"><div class="scene-empty">Cette pièce ne vous est pas encore accessible.<br>Amaury vous l'ouvrira plus tard.</div></div>`;
    return;
  }
  let html=`<div class="scene">
    <h2><span class="icon">${loc.icon}</span>${loc.name}</h2>
    <div class="scene-sub">Acte ${["I","II","III","IV"][State.currentAct-1]} · 18h${String((State.currentAct-1)*15).padStart(2,'0')}</div>
    <div class="scene-desc">${loc.desc}</div>`;
  if(loc.objects && loc.objects.length){
    html+=`<div class="interest-points">`;
    loc.objects.forEach(oid=>{
      const o=OBJECTS[oid];if(!o)return;
      const found=State.foundObjects.has(oid);
      const avail=isObjAvailable(oid);
      const cls="point"+(found?" found":"")+(!avail?" locked":"")+(avail&&!found?" new":"");
      const click=avail?`onclick="openObject('${oid}')"`:"";
      html+=`<div class="${cls}" ${click}>
        <span class="icon">${o.icon||"📦"}</span>
        <div class="label">${o.name}</div>
        <div class="hint">${found?"Examiné":(avail?"Cliquez pour examiner":"À venir")}</div>
      </div>`;
    });
    html+=`</div>`;
  } else {
    html+=`<div class="scene-empty">Rien à examiner ici — sinon les témoignages que les convives vous donneront.</div>`;
  }
  html+=`</div>`;
  $("#scene-content").innerHTML=html;
}
function setLocation(id){
  if(!isLocOpen(id))return;
  State.currentLocation=id;
  renderLocTabs();renderScene();
}

function updateFloating(){
  $("#cnt-inv").textContent=State.inventory.size;
  $("#cnt-note").textContent=State.notebook.length;
}

/* ============================================================
   DIALOG (character + object)
   ============================================================ */
function openDlg(opts){
  $("#dlg-title").textContent=opts.title||"";
  $("#dlg-role").textContent=opts.role||"";
  $("#dlg-portrait").className="portrait "+(opts.statut||"");
  $("#dlg-portrait").textContent=opts.icon||"";
  $("#dlg-body").innerHTML=opts.body||"";
  $("#dlg-back").classList.add("show");
  $("#dlg-body").scrollTop=0;
}
function closeDlg(){$("#dlg-back").classList.remove("show")}

function talkTo(charId){
  const c=CHARACTERS[charId];
  State.charactersTalked.add(charId);
  let html=`<div class="quote">${c.presentation}</div>`;
  const ask=c.questions.filter(q=>!q.confront && isQAvailable(c,q));
  const conf=c.questions.filter(q=>q.confront && isQAvailable(c,q));
  const locked=c.questions.filter(q=>!isQAvailable(c,q));

  html+='<div class="questions">';
  if(ask.length){
    html+=`<h4>Vous demandez</h4>`;
    ask.forEach(q=>{
      const answered=State.answeredQuestions.has(charId+"."+q.id);
      html+=`<button class="q-btn ${answered?"answered":""}" onclick="askQ('${charId}','${q.id}')">${q.label}</button>`;
    });
  }
  if(conf.length){
    html+=`<h4 style="margin-top:18px">Vous pouvez confronter</h4>`;
    conf.forEach(q=>{
      const answered=State.answeredQuestions.has(charId+"."+q.id);
      html+=`<button class="q-btn confront ${answered?"answered":""}" onclick="askQ('${charId}','${q.id}')">${q.label}</button>`;
    });
  }
  if(locked.length){
    html+=`<h4 style="margin-top:18px;color:var(--brown-soft)">Pour plus tard</h4>`;
    locked.forEach(q=>{
      let reason="à venir";
      if(q.act && State.currentAct<q.act)reason=`Acte ${["I","II","III","IV"][q.act-1]}+`;
      else if(q.requires)reason="objet manquant";
      else if(q.requires_response)reason="info manquante";
      html+=`<button class="q-btn" disabled>${q.label} — <i>${reason}</i></button>`;
    });
  }
  html+='</div>';
  openDlg({title:c.name,role:c.role,statut:c.statut,icon:c.icon,body:html});
  renderSidebar();
}

function askQ(charId,qId){
  const c=CHARACTERS[charId];
  const q=c.questions.find(qq=>qq.id===qId);
  if(!q)return;
  State.answeredQuestions.add(charId+"."+q.id);
  if(q.reveals)q.reveals.forEach(r=>State.revealedFacts.add(r));
  if(q.givesItem){
    State.inventory.add(q.givesItem);
    State.foundObjects.add(q.givesItem);
    noteToBook("Obtenu : "+OBJECTS[q.givesItem].name,"Donné par "+c.nickname);
  }
  if(q.endGame){State.resolved=true}
  // notebook
  if(!q.isPresentation){
    noteToBook(c.nickname+" — "+q.label,stripHTML(q.response).slice(0,260)+(q.response.length>260?"…":""));
  }

  let body=`<p style="font-size:12px;color:var(--brown-soft);text-transform:uppercase;letter-spacing:1px;margin:0 0 4px">Vous demandez :</p>
  <p style="font-style:italic;margin:0 0 14px;color:var(--brown)">${q.label}</p>
  <div style="border-top:1px solid rgba(120,80,50,.15);padding-top:14px"></div>`;
  if(q.isPresentation){
    body+=`<div class="quote">${c.presentation}</div>`;
  } else {
    body+=`<div class="quote">${q.response}</div>`;
  }
  if(q.givesItem){
    body+=`<p style="text-align:center;color:var(--gold);font-weight:600;margin-top:14px">★ Vous obtenez : ${OBJECTS[q.givesItem].name}</p>`;
  }
  if(q.endGame){
    body+=`<div class="success-card"><h3>★ La vérité éclate ★</h3>
      <p style="text-align:center;color:var(--brown);line-height:1.7">
      Lady Amandinette de Parisette — née Amandine de la Grande Leuleu, ancienne servante chez les Beauchamp, usurpe l’identité de sa maîtresse Mademoiselle Amandinette de Beauchamp morte d’une fièvre — vole sa carte d’invitation au bal Parisette et une de ses robes, y rencontre Théodorette et l’épouse — a tué Léa pour préserver son imposture. Théodorette est dévasté. Le jardin se tait. Vous avez résolu l'affaire.</p>
      <p style="margin-top:14px"><b>Drames parallèles révélés :</b></p>
      <p style="font-size:14px;color:var(--brown-2);text-align:left;padding:0 14px">
      • <b>Théodorette</b> : chantage Vienne. Couvrait Amandinette par instinct.<br>
      • <b>Louis-Marc ⟷ Gautier</b> : liaison de 5 ans. Chantage.<br>
      • <b>Marie</b> : amante de Léa.<br>
      • <b>Nicolas (Plumeau) / Romanette</b> : fiancés secrets.<br>
      • <b>Alicia ⟷ Nicolas</b> : liaison passée, lettres confiées à Léa.<br>
      • <b>Clochette</b> : dettes de jeu.<br>
      • <b>Boulet ⟷ Tatoine</b> : lettres anciennes.
      </p></div>`;
  } else {
    body+=`<div style="margin-top:14px;text-align:right"><button class="q-btn" style="display:inline-block;width:auto" onclick="talkTo('${charId}')">Continuer</button></div>`;
  }
  openDlg({title:c.name,role:c.role,statut:c.statut,icon:c.icon,body});
  renderAll();
}

function openObject(objId){
  const o=OBJECTS[objId];if(!o)return;
  const wasNew=findObject(objId);
  let html=`<p style="font-style:italic;color:var(--brown-2);line-height:1.6">${o.desc||""}</p>`;
  if(o.text){
    html+=`<div class="text-card${o.burnt?" burnt":""}">${o.text}</div>`;
  }
  if(o.isCode && !State.foundObjects.has("__opened_"+objId)){
    html+=`<div class="code-box">
      <p style="margin:0 0 8px">Composez le code à 3 chiffres :</p>
      <input id="codeinput" maxlength="3" inputmode="numeric" placeholder="•••">
      <button onclick="tryCode('${objId}')">Ouvrir</button>
      <div class="hint">Léa avait pour méthode de convertir les <i>initiales d'un nom</i> en chiffres, via une grille qu'elle gardait dans son atelier.</div>
      <div id="code-feedback"></div>
    </div>`;
  }
  if(o.interactive){
    html+='<div style="margin-top:14px">';
    o.interactive.forEach(i=>{
      const gives=i.gives;
      const already=gives && State.foundObjects.has(gives);
      const reqMet=!i.requires_response || i.requires_response.every(r=>State.revealedFacts.has(r));
      if(!reqMet){
        html+=`<button class="q-btn" disabled>${i.label}</button>`;
      } else if(already){
        html+=`<button class="q-btn answered">${i.label}</button>`;
      } else {
        html+=`<button class="q-btn" onclick='doInteract("${objId}","${gives}")'>${i.label}</button>`;
      }
    });
    html+='</div>';
  }
  if(o.location){
    html+=`<p style="margin-top:14px;font-size:13px;color:var(--brown-soft);text-align:right">📍 ${LOCATIONS[o.location]?LOCATIONS[o.location].name:o.location}</p>`;
  }
  openDlg({title:o.name,role:o.location?LOCATIONS[o.location]?.name||"":"",icon:o.icon,body:html});
  renderAll();
}

function doInteract(objId,gives){
  const wasNew=findObject(gives);
  setTimeout(()=>openObject(gives),100);
}

function tryCode(objId){
  const o=OBJECTS[objId];
  const input=$("#codeinput").value.trim();
  const fb=$("#code-feedback");
  if(input===o.code){
    State.foundObjects.add("__opened_"+objId);
    fb.innerHTML='<p style="color:var(--gold);font-weight:600;margin:12px 0 0;text-align:center;font-size:18px">🔓 Click. Le cadenas cède.</p>';
    (o.onCodeSuccess||[]).forEach(g=>findObject(g));
    noteToBook("Énigme résolue","La boîte de la malle s'ouvre. Vrai acte de naissance + lettre du 5 juin.");
    setTimeout(()=>{openObject((o.onCodeSuccess||[])[0]);renderAll()},1300);
  } else {
    fb.innerHTML=`<p class="failure">${o.onCodeFail||"Mauvais code."}</p>`;
  }
}

/* ============================================================
   PANELS
   ============================================================ */
function showPanel(html){
  $("#panel-content").innerHTML=html;
  $("#panel").classList.add("show");
  $("#panel-back").classList.add("show");
}
function closePanel(){
  $("#panel").classList.remove("show");
  $("#panel-back").classList.remove("show");
}

$("#btn-inventory").onclick=()=>{
  let html=`<h2>Vos affaires</h2><p style="text-align:center;color:var(--brown-soft);font-style:italic">Tout ce que vous avez trouvé.</p>`;
  if(State.inventory.size===0){
    html+=`<p style="text-align:center;padding:30px;color:var(--brown-soft)">Rien encore. Fouillez les lieux ouverts.</p>`;
  } else {
    html+=`<div class="inventory-grid">`;
    [...State.inventory].forEach(id=>{
      const o=OBJECTS[id];if(!o)return;
      html+=`<div class="inv-item" onclick="closePanel();openObject('${id}')">
        <span class="icon">${o.icon||"📦"}</span>
        <div class="name">${o.name}</div></div>`;
    });
    html+=`</div>`;
  }
  showPanel(html);
};

$("#btn-notebook").onclick=()=>{
  let html=`<h2>Carnet d'enquête</h2><p style="text-align:center;color:var(--brown-soft);font-style:italic">Les notes s'inscrivent au fil de votre enquête.</p>`;
  if(State.notebook.length===0){
    html+=`<p style="text-align:center;padding:30px;color:var(--brown-soft)">Vous n'avez rien noté pour l'instant.</p>`;
  } else {
    State.notebook.forEach(e=>{
      html+=`<div class="notebook-entry"><div class="meta">Acte ${["I","II","III","IV"][e.act-1]} · ${e.meta}</div><div class="body">${e.body}</div></div>`;
    });
  }
  showPanel(html);
};

$("#btn-mj").onclick=()=>{
  const act=State.currentAct;
  const nextAct=ACTS[act];
  let html=`<h2>Sir Amaury</h2><p style="text-align:center;color:var(--brown-soft);font-style:italic">Votre époux, maître du Domaine.</p>`;
  html+=`<div class="quote">« Tu progresses bien, ma chère. Dis-moi quand tu veux que j'ouvre la pièce suivante. »</div>`;
  html+=`<div class="mj-section">
    <h3>Régulation de la partie</h3>
    <div style="font-size:13px;color:var(--gold-light);margin:6px 0">Acte courant : <b>${["I","II","III","IV"][act-1]}</b> — ${ACTS[act-1].name}</div>`;
  if(act<4){
    html+=`<button class="mj-btn" onclick="nextAct()">Ouvrir l'Acte ${["II","III","IV"][act-1]} : ${ACTS[act].name.replace(/^Acte [IV]+ — /,'')}</button>
    <div class="mj-hint">Déclencheur : ${["Chloé a interrogé plusieurs convives et veut voir où ils étaient au toast.","Chloé évoque des déplacements suspects à l'intérieur.","Chloé ramène la clef récupérée sur Alicia.","Tous les lieux sont ouverts."][act-1]}</div>`;
  } else {
    html+=`<button class="mj-btn" disabled>Tous les actes sont ouverts</button>`;
  }
  html+=`</div>`;
  html+=`<div style="margin-top:18px"><button class="q-btn" onclick="closePanel();talkTo('amaury')">Parler à Amaury</button></div>`;
  showPanel(html);
};

function nextAct(){
  if(State.currentAct>=4)return;
  State.currentAct++;
  const newLocs=ACTS[State.currentAct-1].locations;
  noteToBook("Acte avancé","Sir Amaury vient d'ouvrir : "+newLocs.map(l=>LOCATIONS[l].name).join(", "));
  // Switch to first new location
  State.currentLocation=newLocs[0];
  closePanel();
  renderAll();
}

/* ============================================================
   RENDER ALL
   ============================================================ */
function renderAll(){
  updateTopbar();
  renderSidebar();
  renderLocTabs();
  renderScene();
  updateFloating();
}

/* ============================================================
   INIT
   ============================================================ */
noteToBook("Arrivée au Domaine","18h00. Sir Amaury vous accueille au jardin. Léa est morte dans la dépendance. Vous avez une heure.");
State.currentLocation="jardin";
renderAll();
</script>
